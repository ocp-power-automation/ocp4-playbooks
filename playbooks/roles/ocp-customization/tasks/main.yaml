# tasks file for ocp4 post install customizations

- name: Install python devel
  become: true
  package:
    name:
      - python3
      - python3-devel
      - gcc
    state: present

- name: Install python packages
  become: true
  pip:
    executable: pip3
    name: oauthlib==3.2.0

- name: Install openshift python module
  become: true
  pip:
    executable: pip3
    name: openshift

- name:
  block:
    - name: Pause reboot node (Machineconfig)
      k8s:
        merge_type: merge
        kind: MachineConfigPool
        name: "{{ item }}"
        definition:
          spec:
            paused: true
      loop:
        - master
        - worker

    - name: Configure RHCOS kernel options via MachineConfig
      when: rhcos_kernel_options | length > 0
      import_tasks: kernel.yaml

    - name: Configure Kernel tunables (sysctl) via Tuned Operator
      when: sysctl_tuned_options
      import_tasks: tuned.yaml

    - name: Display deprecation warning for powervm_rmc
      when: powervm_rmc is defined and powervm_rmc
      debug:
        msg: "WARNING: 'powervm_rmc' is deprecated and will be removed in a future release. Please use 'powervm_rsct' instead. The 'powervm_rmc' flag now installs the RSCT operator."

    - name: Configure PowerVM RMC daemonset (DEPRECATED - use powervm_rsct)
      when: powervm_rmc is defined and powervm_rmc and (powervm_rsct is not defined or not powervm_rsct)
      import_tasks: powervm_rsct.yaml

    - name: Configure PowerVM RSCT operator
      when: powervm_rsct is defined and powervm_rsct
      import_tasks: powervm_rsct.yaml

  always:
    - name: UnPause reboot node (Machineconfig)
      k8s:
        merge_type: merge
        kind: MachineConfigPool
        name: "{{ item }}"
        definition:
          spec:
            paused: false
      loop:
        - master
        - worker

- name: Automate Node Labels
  when: node_labels
  import_tasks: node-label.yaml
