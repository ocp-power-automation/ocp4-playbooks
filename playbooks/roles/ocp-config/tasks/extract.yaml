---

- name: Set tools directory path
  set_fact:
    tools_dir: "~/ocp4_tools"

- name: Create tools directory
  file:
    path: "{{ tools_dir }}"
    state: "{{ item }}"
    mode: '0755'
  with_items:
  - directory

- name: local-registry service
  block:
  - name: Restart local-registry service
    service:
      name: local-registry
      state: restarted

  - name: Wait for local-registry to restart
    wait_for:
      timeout: 15
  when: enable_local_registry

- name: Retrieve the Release Image Manifest
  shell: |
      oc adm release info {{ release_image }} -o json
  register: release_manifest

- name: Query for the OCP Version from Release Image Manifest
  shell: |
      echo '{{ release_manifest.stdout }}' | jq -r '.' | jq -r '.config.config.Labels["io.openshift.release"]'
  register: release_version

- name: Register the MAJOR, MINOR for the ocp_version
  shell: |
      echo "{{ release_version.stdout }}" | tr '.' ' ' | awk '{print $1, $2}'
  register: ocp_version

- name: Check if oc-mirror is already installed
  command: which oc-mirror
  register: oc_mirror_check
  failed_when: false
  changed_when: false

- name: Downloading oc-mirror package
  get_url:
    url: "{{ oc_mirror }}"
    dest: /usr/local/src/oc-mirror.tar.gz
    mode: 0644
  when: (download_imgs or force_ocp_download) and oc_mirror_check.rc != 0

- name: Unarchiving oc-mirror package
  unarchive:
    src: /usr/local/src/oc-mirror.tar.gz
    dest: /usr/local/bin
    remote_src: yes
    creates: "{{ oc_mirror_bin }}"
  when: (download_imgs or force_ocp_download) and oc_mirror_check.rc != 0

- name: Set executable permission on oc-mirror
  file:
    path: "/usr/local/bin/{{ oc_mirror_bin }}"
    mode: "0755"
    owner: root
    group: root
  when: (download_imgs or force_ocp_download) and oc_mirror_check.rc != 0

- name: Re-check oc-mirror after installation
  command: which oc-mirror
  register: oc_mirror_check
  failed_when: false
  changed_when: false

- name: Extract OCP4 tools from release image ( local-registry )
  when:
  - enable_local_registry
  - (((ocp_version.stdout.split(' ')[0] | int ) >= 4 and (ocp_version.stdout.split(' ')[1] | int) > 19 ) or ((ocp_version.stdout.split(' ')[0] | int ) >= 5 ))
  - oc_mirror_check.rc != 0
  shell: |
    oc adm release extract --tools {{ release_image_override }} --registry-config='{{ ansible_env.HOME }}/.openshift/pull-secret-updated'
  args:
    chdir: "{{ tools_dir }}"

- name: Create pull-secret file
  when: not enable_local_registry
  copy:
    content: "{{ install_config.pull_secret }}"
    dest: "{{ tools_dir }}/pull-secret"

- name: Extract OCP4 tools from release image
  when: not enable_local_registry
  shell: |
    oc adm release extract --tools {{ release_image_override }} --registry-config='pull-secret'
  args:
    chdir: "{{ tools_dir }}"

- name: Find archive packages
  find:
    paths: "{{ tools_dir }}"
    patterns: "openshift-*.tar.gz"
  register: find_result

- name: Unarchive OCP4 tool files
  unarchive:
    src: "{{ item.path }}"
    dest: /usr/local/bin
    remote_src: yes
  with_items: "{{ find_result.files }}"

- name: Check if openshift-install binary exists
  ansible.builtin.stat:
    path: "/usr/local/bin/openshift-install"
  register: binary_check
  
- name: Remove openshift-install binary when FIPS is enabled
  ansible.builtin.file:
    path: "/usr/local/bin/openshift-install"
    state: absent
  when: 
    - fips_compliant
    - binary_check.stat.exists

- name: Link openshift-install-fips to openshift-install
  file:
    src: "/usr/local/bin/openshift-install-fips"
    dest: "/usr/local/bin/openshift-install"
    state: link
  when: 
    - fips_compliant  # FIPS is enabled
    - binary_check.stat.exists

- name: Remove tools directory
  file:
    path: "{{ tools_dir }}"
    state: "{{ item }}"
    mode: '0755'
  with_items:
  - absent

