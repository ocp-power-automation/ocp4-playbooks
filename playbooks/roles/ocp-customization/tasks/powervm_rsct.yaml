- name: Insure able to fetch project list
  shell: "oc get projects"
  register: projects_list
  until: projects_list.stdout.find("default") != -1
  retries: 20
  delay: 30

- name: Get latest RSCT Operator version
  shell: |
    curl -s "https://api.github.com/repos/ocp-power-automation/rsct-operator/releases" | grep '"tag_name":' | head -1 | sed -E 's/.*"([^"]+)".*/\1/'
  register: rsct_version
  changed_when: false

- name: Deploy RSCT Operator
  shell: |
    oc apply -k "https://github.com/ocp-power-automation/rsct-operator/config/install/?ref={{ rsct_version.stdout }}"
  register: deploy_operator
  failed_when: deploy_operator.rc != 0 and 'AlreadyExists' not in deploy_operator.stderr
  changed_when: deploy_operator.rc == 0

- name: Wait for RSCT Operator deployment to be ready
  shell: |
    oc get deployment.apps/rsct-operator-controller-manager -n rsct-operator-system -o jsonpath='{.status.conditions[?(@.type=="Available")].status}'
  register: rsct_deployment_status
  until: rsct_deployment_status.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false

- name: Create RSCT resource
  shell: |
    oc apply -k "https://github.com/ocp-power-automation/rsct-operator/config/samples/?ref={{ rsct_version.stdout }}" -n rsct-operator-system
  register: create_rsct_resource
  failed_when: create_rsct_resource.rc != 0 and 'AlreadyExists' not in create_rsct_resource.stderr
  changed_when: create_rsct_resource.rc == 0

- name: Wait for RSCT daemonset to be ready
  shell: |
    oc get daemonset.apps/rsct -n rsct-operator-system -o jsonpath='{.status.numberReady} {.status.desiredNumberScheduled} {.status.updatedNumberScheduled} {.status.numberAvailable}'
  register: rsct_daemonset_status
  until: >
    (rsct_daemonset_status.stdout.split()[0] | int) == (rsct_daemonset_status.stdout.split()[1] | int) and
    (rsct_daemonset_status.stdout.split()[2] | int) == (rsct_daemonset_status.stdout.split()[1] | int) and
    (rsct_daemonset_status.stdout.split()[3] | int) == (rsct_daemonset_status.stdout.split()[1] | int)
  retries: 15
  delay: 10
  changed_when: false
